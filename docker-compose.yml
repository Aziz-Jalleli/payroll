version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: payroll-db
    environment:
      POSTGRES_DB: payroll_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 369963
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-service:
    build:
      context: ./python-service
    container_name: payroll-python
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  springboot:
    build:
      context: ./payroll
    container_name: payroll-spring
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payroll_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 369963
      PYTHON_SERVICE_URL: http://python-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_healthy

volumes:
  postgres_data: